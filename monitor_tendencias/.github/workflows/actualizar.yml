name: Actualizar Noticias Diarias

on:
  schedule:
    # Esto le dice que se ejecute todos los días a las 12:00 PM
    - cron: '0 12 * * *' 
  workflow_dispatch: # Esto te permite darle a un botón para actualizar cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v2

      - name: Instalar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar librerías necesarias
        run: pip install requests beautifulsoup4

      - name: Ejecutar el script de noticias
        run: python monitor.py

      - name: Guardar y subir las noticias nuevas a GitHub
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add datos.json
          git commit -m "Actualización automática de noticias" || exit 0
          git push